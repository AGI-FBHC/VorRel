model:
  gcnii_layers: 6
  alpha: 0.5
  beta: 1.3
  dropout: 0.1
  hidden_dim: 256
  num_heads: 8
  pos_weight: 10.0

data:
  train_dir: "data/processed/train"
  val_dir: "data/processed/val"
  test_dir: "data/processed/test"
  batch_size: 32
  num_workers: 4

training:
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: "adam"
  scheduler: "cosine"
  warmup_epochs: 5
  early_stopping_patience: 15
  checkpoint_dir: "checkpoints"
  log_dir: "logs"

features:
  esm2_model: "esm2_t33_650M_UR50D"
  pssm_iterations: 3
  pssm_evalue: 0.001
  use_dSSP: true
  use_atomic: true

graph:
  voronoi_enabled: true
  hydrogen_bond_threshold: 3.5
  hydrophobic_threshold: 5.5
  salt_bridge_threshold: 7.5

evaluation:
  metrics: ["accuracy", "precision", "recall", "f1", "mcc", "auroc", "auprc"]
  test_folds: 10
  cross_val_folds: 5
